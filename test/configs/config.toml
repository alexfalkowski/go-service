environment = "development"

[debug]
address = "tcp://localhost:6060"
timeout = "10s"

[cache]
kind = "redis"
encoder = "proto"
compressor = "snappy"
max_size = "4MB"
max_entries = 1024
[cache.options]
url = "file:../test/secrets/redis"

[crypto.aes]
key = "file:../test/secrets/aes"

[crypto.ed25519]
public = "file:../test/secrets/ed25519_public"
private = "file:../test/secrets/ed25519_private"

[crypto.hmac]
key = "file:../test/secrets/hmac"

[crypto.rsa]
public = "file:../test/secrets/rsa_public"
private = "file:../test/secrets/rsa_private"

[crypto.ssh]
public = "file:../test/secrets/ssh_public"
private = "file:../test/secrets/ssh_private"

[feature]
address = "localhost:9000"
timeout = "10s"

[feature.breaker]
max_requests = 2
interval = "15s"
timeout = "5s"
consecutive_failures = 4

[feature.retry]
backoff = "100ms"
timeout = "1s"
attempts = 3

[hooks]
key = "current"

[hooks.secrets]
current = "file:../test/secrets/hooks"
previous = "file:../test/secrets/hooks_previous"

[id]
kind = "uuid"

[sql.pg]
max_open_conns = 5
max_idle_conns = 5
conn_max_idle_time = "30m"
conn_max_lifetime = "1h"

[[sql.pg.writers]]
url = "file:../test/secrets/pg"

[[sql.pg.readers]]
url = "file:../test/secrets/pg"

[telemetry.logger]
kind = "text"
level = "info"

[telemetry.attributes]
"k8s.namespace.name" = "payments"
"service.instance.id" = "instance-1"

[telemetry.metrics]
kind = "prometheus"
interval = "30s"
timeout = "5s"

[telemetry.propagation]
formats = ["tracecontext", "baggage", "b3"]

[telemetry.tracer]
kind = "otlp"
protocol = "http"
url = "http://localhost:4318/v1/traces"

[telemetry.tracer.tls]
ca = "file:../test/certs/rootCA.pem"
cert = "file:../test/certs/client-cert.pem"
key = "file:../test/certs/client-key.pem"
server_name = "collector.example.com"

[telemetry.tracer.sampler]
kind = "ratio"
ratio = 0.25

[telemetry.tracer.headers]
Authorization = "file:../test/secrets/telemetry"

[time]
kind = "nts"
address = "time.cloudflare.com"

[transport.access]
model = "file:../test/configs/rbac.conf"
policy = "file:../test/configs/rbac.csv"

[transport.http]
address = "tcp://localhost:11000"
max_receive_size = "2MB"
timeout = "10s"

[transport.http.limiter]
kind = "user-agent"
tokens = 10
interval = "1s"

[transport.http.options]
read_timeout = "10s"
write_timeout = "10s"
idle_timeout = "10s"
read_header_timeout = "10s"
max_header_bytes = "32KB"

[transport.http.token]
kind = "jwt"

[transport.http.token.jwt]
iss = "iss"
exp = "1h"
key = "1234567890"

[transport.http.token.jwt.keys."1234567890"]
public = "file:../test/secrets/ed25519_public"
private = "file:../test/secrets/ed25519_private"

[transport.grpc]
address = "tcp://localhost:12000"
max_receive_size = "3MB"
timeout = "10s"

[transport.grpc.limiter]
kind = "user-agent"
tokens = 10
interval = "1s"

[transport.grpc.options]
keepalive_enforcement_policy_ping_min_time = "10s"
keepalive_max_connection_idle = "10s"
keepalive_max_connection_age = "10s"
keepalive_max_connection_age_grace = "10s"
keepalive_ping_time = "10s"
max_concurrent_streams = "64"
connection_timeout = "3s"
max_header_list_size = "16MB"
initial_window_size = "1MB"
initial_conn_window_size = "2MB"
max_send_msg_size = "8MB"

[transport.grpc.token]
kind = "jwt"

[transport.grpc.token.jwt]
iss = "iss"
exp = "1h"
key = "1234567890"

[transport.grpc.token.jwt.keys."1234567890"]
public = "file:../test/secrets/ed25519_public"
private = "file:../test/secrets/ed25519_private"
