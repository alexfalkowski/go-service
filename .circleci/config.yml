version: 2.1

commands:
  sync-submodules:
    steps:
      - run: git submodule sync
      - run: git submodule update --init
  checkout-submodules:
    steps:
      - checkout:
          method: blobless
      - sync-submodules

executors:
  go-with-postgres-valkey-status-mimir:
    docker:
      - image: alexfalkowski/go:4.27
      - image: postgres:18-trixie
        environment:
          POSTGRES_DB: test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
      - image: valkey/valkey:9
      - image: alexfalkowski/status:latest
        command: server -config env:CONFIG
        environment:
          CONFIG: yml:ZW52aXJvbm1lbnQ6IGRldmVsb3BtZW50CmhlYWx0aDoKICBkdXJhdGlvbjogMXMKICB0aW1lb3V0OiAxcwppZDoKICBraW5kOiB1dWlkCnRlbGVtZXRyeToKICBsb2dnZXI6CiAgICBraW5kOiB0ZXh0CiAgICBsZXZlbDogaW5mbwp0cmFuc3BvcnQ6CiAgaHR0cDoKICAgIGFkZHJlc3M6IHRjcDovLzo2MDAwCiAgICB0aW1lb3V0OiAxMHMK
      - image: grafana/mimir:latest
        command: -server.http-listen-port=9009 -auth.multitenancy-enabled=false -ingester.ring.replication-factor=1
  release:
    docker:
      - image: alexfalkowski/release:8.23
  alpine:
    docker:
      - image: alpine:latest

jobs:
  build:
    executor: go-with-postgres-valkey-status-mimir
    working_directory: ~/go-service
    steps:
      - checkout-submodules
      - run: make source-key
      - run: mkcert -install
      - run: make create-certs
      - run: dockerize -wait tcp://localhost:5432 -wait tcp://localhost:6379 -wait tcp://localhost:6000 -wait tcp://localhost:9009 -timeout 1m
      - restore_cache:
          name: restore go cache
          keys:
            - go-service-go-cache-v2-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
            - go-service-go-cache-v2-
      - run: make clean
      - run: make dep
      - save_cache:
          name: save go cache
          key: go-service-go-cache-v2-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}
          paths:
            - ~/go/pkg/mod
      - restore_cache:
          name: restore go build cache
          keys:
            - go-service-go-build-cache-v2-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
            - go-service-go-build-cache-v2-
      - restore_cache:
          name: restore go lint cache
          keys:
            - go-service-go-lint-cache-v2-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
            - go-service-go-lint-cache-v2-
      - run: make clean
      - run: make lint
      - save_cache:
          name: save go lint cache
          key: go-service-go-lint-cache-v2-{{ checksum "go.sum" }}-{{ checksum "~/.go-lint-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/golangci-lint
      - run: make generate-stale
      - run: make sec
      - run: make specs
      - run: make fuzzes
      - run: make benchmarks
      - save_cache:
          name: save go build cache
          key: go-service-go-build-cache-v2-{{ checksum "go.sum" }}-{{ checksum "~/.go-version" }}-{{ checksum ".source-key" }}
          paths:
            - ~/.cache/go-build
      - run: make coverage
      - store_test_results:
          path: test/reports
      - store_artifacts:
          path: test/reports
      - run: make codecov-upload
    resource_class: arm.large
  sync:
    executor: release
    working_directory: ~/go-service
    steps:
      - checkout-submodules
      - run: make sync push
    resource_class: arm.large
  version:
    executor: release
    working_directory: ~/go-service
    steps:
      - checkout-submodules
      - run: version
      - run: package
    resource_class: arm.large
  wait-all:
    executor: alpine
    resource_class: small
    steps:
      - run: echo "all applicable jobs finished"

workflows:
  go-service:
    max_auto_reruns: 3
    jobs:
      - build
      - sync:
          requires:
            - build
          filters: 'pipeline.git.branch != "master"'
      - version:
          context: gh
          serial-group: << pipeline.project.slug >>/version
          requires:
            - build
          filters: 'pipeline.git.branch == "master"'
      - wait-all:
          requires:
            - build
            - sync
            - version
